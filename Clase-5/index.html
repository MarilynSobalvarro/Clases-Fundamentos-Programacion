        <!-- VARIABLES-->
        <!--
        1. Var = variable (sirven para dar un valor) / No se pueden tener variables con el mismo nombre..
        2. const = constante
        3. A las variables si se les puede asignar valor despues o no ponerles.
        4. Los const no se les puede asignar valor despues / deben llevarlo desde el principio.
        5. Let si permite ca,biar o asignar valor despues (Es el mas usado y recomendado).
        6. Cometarios en Jvascript: sin cierre // o con cierre  /*  */

        console.log('Hola mundo!')

            var x = 5;
            x = 4888;
            console.log('x');

            const y = 20
            console.log('y');

            let z = 67;

            z = 5000;

            let x = 40;

            let y = 'Hola';

            console. log(y + w);
        -->
        <script>

            let nombre = 'Marilyn';

            let nacimiento = 2003;

            let actual = 2026;
